#include <WiFi.h>

#define OnboardLED 2  // Onboard LED (GPIO2 on ESP32)

WiFiServer server(80);

void setup() {
  Serial.begin(9600);

  // Configure fixed IP for the Access Point
  IPAddress local_IP(192,168,10,1);   // ESP32 AP IP
  IPAddress gateway(192,168,10,1);    // Gateway (same as ESP32)
  IPAddress subnet(255,255,255,0);    // Subnet mask

  WiFi.mode(WIFI_AP);
  if (!WiFi.softAPConfig(local_IP, gateway, subnet)) {
    Serial.println("AP Config Failed!");
  }

  // Start Access Point
  WiFi.softAP("ESP32_LED_AP", "12345678"); // SSID and password

  Serial.println("Access Point Started");
  Serial.print("AP IP Address: ");
  Serial.println(WiFi.softAPIP());

  server.begin();
  pinMode(OnboardLED, OUTPUT);
  digitalWrite(OnboardLED, HIGH); // LED OFF initially
}

void loop() {
  WiFiClient client = server.available();
  if (client) {
    String request = client.readStringUntil('\r');
    client.flush();
    Serial.println(request);

    if (request.indexOf("/ledon") != -1) {
      digitalWrite(OnboardLED, LOW);  // LED ON
    }
    if (request.indexOf("/ledoff") != -1) {
      digitalWrite(OnboardLED, HIGH); // LED OFF
    }

    // Send simple webpage back
    client.println("HTTP/1.1 200 OK");
    client.println("Content-Type: text/html");
    client.println("");
    client.println("<!DOCTYPE HTML>");
    client.println("<html>");
    client.println("<h1>ESP32 LED Control</h1>");
    client.println("<p><a href=\"/ledon\">Turn LED ON</a></p>");
    client.println("<p><a href=\"/ledoff\">Turn LED OFF</a></p>");
    client.println("</html>");
  }
}