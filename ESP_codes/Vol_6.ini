#include <WiFi.h>
#include <ESPmDNS.h>

#define OnboardLED 2
WiFiServer server(80);

const char* ssid = "PriyomPhone";
const char* password = "1234priyom";

void setup() {
  Serial.begin(115200);

  WiFi.begin(ssid, password);
  Serial.print("Connecting to WiFi");
  while (WiFi.status() != WL_CONNECTED) {
    delay(1000);
    Serial.print(".");
  }

  Serial.println("\nConnected!");
  Serial.print("ESP32 IP Address: ");
  Serial.println(WiFi.localIP());

  // Start mDNS responder with name "esp32"
  if (!MDNS.begin("esp32")) {
    Serial.println("Error starting mDNS responder!");
  } else {
    Serial.println("mDNS responder started. Access via http://esp32.local");
  }

  server.begin();
  pinMode(OnboardLED, OUTPUT);
  digitalWrite(OnboardLED, HIGH); // LED OFF initially
}

void loop() {
  WiFiClient client = server.available();
  if (client) {
    String request = client.readStringUntil('\r');
    client.flush();
    Serial.println(request);

    if (request.indexOf("/ledon") != -1) {
      digitalWrite(OnboardLED, LOW);  // LED ON
    }
    if (request.indexOf("/ledoff") != -1) {
      digitalWrite(OnboardLED, HIGH); // LED OFF
    }

    client.println("HTTP/1.1 200 OK");
    client.println("Content-Type: text/html");
    client.println("");
    client.println("<!DOCTYPE HTML>");
    client.println("<html>");
    client.println("<h1>ESP32 LED Control</h1>");
    client.println("<p><a href=\"/ledon\">Turn LED ON</a></p>");
    client.println("<p><a href=\"/ledoff\">Turn LED OFF</a></p>");
    client.println("</html>");
  }
}
